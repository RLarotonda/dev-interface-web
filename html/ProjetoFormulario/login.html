<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login">
        <div class="icon"></div>
        <h1>Login</h1>
        <form accept="#" method="post">
            <div class="input-group">
                <img src="icons/email.png" alt="Email" class="input-icon">
                <input
                    type="text"
                    name="email"
                    id="email"
                    required
                    placeholder="Email" 
                />
            </div>

            <div class="input-group">
                <img src="icons/password.png" alt="Password" class="input-icon">
                <input 
                    type="password"
                    name="pass"
                    id="pass"
                    required
                    placeholder="Password"
                />
            </div>
        
            <div class="link-forgot">
                <a href="#">Forgot password?</a>
            </div>
            
            <button type="submit" class="btn">Sign In</button>
            
            <p>Don't have an account? <a href="#">Register</a></p>
        </form>
    </div>
</body>
</html>
