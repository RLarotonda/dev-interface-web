<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creat Account</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <div class="register">
        <form accept="#" method="post">
             <fieldset>
                <legend>Personal Data</legend>
                <div class="form-grid">
                    <div class="input-container">
                        <img src="icons/name.png" alt="Icon" class="input-icon">
                        <input type="text" placeholder="Full Name">

                    </div>
                    <div class="input-container">
                        <img src="icons/cpf.png" alt="Icon" class="input-icon">
                        <input type="text" placeholder="CPF">
                    </div>
                    <div class="input-container">
                        <img src="icons/birth.png" alt="Icon" class="input-icon">
                        <input type="date" max="2013-12-31">
                    </div>
                    <div class="input-container">
                        <img src="icons/phone.png" alt="Icon" class="input-icon">
                        <input type="tel" placeholder="Phone Number">
                    </div>
                    <div class="input-container">
                        <img src="icons/password_blue.png" alt="Icon" class="input-icon">
                        <input type="password" placeholder="Password">
                    </div>
                    <div class="input-container">
                        <img src="icons/password_blue.png" alt="Icon" class="input-icon">
                        <input type="password" placeholder="Confirm Password">
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Address</legend>
                <div class="form-grid">
                    <div class="input-container">
                        <img src="icons/cep.png" alt="Icon" class="input-icon">
                        <input type="text" placeholder="ZIP Code (CEP)">
                    </div>
                    <div class="input-container">
                        <img src="icons/street.png" alt="Icon" class="input-icon">
                        <input type="text" placeholder="Street">
                    </div>
                    <div class="input-container">
                        <img src="icons/neighborhood.png" alt="Icon" class="input-icon">
                        <input type="text" placeholder="Neighborhood">
                    </div>
                    <div class="input-container">
                        <img src="icons/city.png" alt="Icon" class="input-icon">
                        <input type="text" placeholder="City">
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Professional Data</legend>
                <div class="form-grid">
                    <div class="input-container">
                        <img src="icons/company.png" alt="Icon" class="input-icon">
                        <input type="text" placeholder="Company">
                    </div>
                    <div class="input-container">
                        <img src="icons/title.png" alt="Icon" class="input-icon">
                        <input type="text" placeholder="Job Title">
                    </div>
                    <div class="input-container">
                        <img src="icons/linkedin.png" alt="Icon" class="input-icon">
                        <input type="url" placeholder="LinkedIn URL">
                    </div>
                </div>
            </fieldset>

            <button type="submit" class="btn">Create Account</button>
        </form>
    </div>
</body>
</html>
