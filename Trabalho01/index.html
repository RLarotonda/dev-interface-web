<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Huddle</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="logo">
          <img src="images/icon.png" alt="Huddle logo" />
          <span>Huddle</span>
        </div>
      </header>

      <main>
        <section class="illustrations">
          <div class="desktop-img">
            <img src="images/desktop.png" alt="Interface no desktop" />
            <div class="mobile-img">
              <img src="images/mobile.png" alt="Interface no celular" />
            </div>
          </div>
        </section>

        <section class="content">
          <h1>Build The Community Your Fans Will Love</h1>
          <p>
            Huddle re-imagines the way we build communities. You have a voice,
            but so does your audience. Create connections with your users as you
            engage in genuine discussion.
          </p>
          <button type="button">Register</button>
        </section>
      </main>

      <footer>
        <div class="social-links">
          <a href="#"><img src="images/facebook.jpg" alt="Facebook icon" /></a>
          <a href="#"><img src="images/twitter.jpg" alt="Twitter icon" /></a>
          <a href="#"><img src="images/instagram.jpg" alt="Instagram icon" /></a>
        </div>
      </footer>
    </div>
  </body>
</html>
